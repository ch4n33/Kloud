apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: kloud-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      # nodeSelector 없음 — Ryzen(amd64) + Pi(arm64) 양쪽에 배포하여 멀티아키텍처 검증
      containers:
        - name: sample-app
          image: ghcr.io/ch4n33/sample-app:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 100m
