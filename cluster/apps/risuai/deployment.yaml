apiVersion: apps/v1
kind: Deployment
metadata:
  name: risuai
  namespace: kloud-apps
spec:
  replicas: 1
  strategy:
    type: Recreate  # PV 사용, 동시 마운트 방지
  selector:
    matchLabels:
      app: risuai
  template:
    metadata:
      labels:
        app: risuai
    spec:
      # hostPath PV가 Ryzen에 있으므로 Ryzen 고정
      nodeSelector:
        kubernetes.io/hostname: ch4n33-server
      containers:
        - name: risuai
          image: ghcr.io/kwaroran/risuai:latest
          # 리버스 프록시(Traefik) 뒤에서 rate-limit 429 방지 패치
          command: ["/bin/sh", "-c"]
          args:
            - |
              sed -i "s/const app = express();/const app = express();\napp.set('trust proxy', 1);/" /app/server/node/server.cjs
              sed -i 's/max: 90/max: 100000/g' /app/server/node/server.cjs
              # fs가 fs/promises로 할당되어 fs.writeFileSync 크래시 — 동기 fs 별도 변수로 추가
              sed -i "s/const fs = require('fs\/promises')/const fs = require('fs\/promises'); const fsSync = require('fs')/" /app/server/node/server.cjs
              sed -i 's/fs\.writeFileSync/fsSync.writeFileSync/g' /app/server/node/server.cjs
              sed -i 's/fs\.readFileSync/fsSync.readFileSync/g' /app/server/node/server.cjs
              # safeStructuredClone 미정의 버그 우회 (모듈 로드 전에 globalThis에 주입)
              sed -i 's|<head>|<head><script>globalThis.safeStructuredClone=function(o){try{return structuredClone(o)}catch(e){return JSON.parse(JSON.stringify(o))}}</script>|' /app/dist/index.html
              node /app/server/node/server.cjs
          ports:
            - containerPort: 6001
          livenessProbe:
            httpGet:
              path: /
              port: 6001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 6001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 64Mi
              cpu: 10m
            limits:
              memory: 256Mi
              cpu: 200m
          volumeMounts:
            - name: risuai-data
              mountPath: /app/save
      volumes:
        - name: risuai-data
          persistentVolumeClaim:
            claimName: risuai-pvc
