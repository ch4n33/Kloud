apiVersion: v1
kind: PersistentVolume
metadata:
  name: risuai-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /home/ch4n33/server-data/risuai
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: ["ch4n33-server"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: risuai-pvc
  namespace: kloud-apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: risuai-pv
  resources:
    requests:
      storage: 2Gi
