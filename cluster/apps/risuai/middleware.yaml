apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: risuai-basicauth
  namespace: kloud-apps
spec:
  basicAuth:
    secret: risuai-basicauth-secret
---
# BasicAuth 브루트포스 방지 — 분당 5회 제한 (정상 로그인에 영향 없음)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: risuai-ratelimit
  namespace: kloud-apps
spec:
  rateLimit:
    average: 2
    burst: 5
    period: 1m
    sourceCriterion:
      ipStrategy:
        depth: 1
