apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: risuai-basicauth
  namespace: kloud-apps
spec:
  basicAuth:
    secret: risuai-basicauth-secret
---
# BasicAuth 브루트포스 방지 — 401 응답 4회 시 3시간 IP 차단
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: risuai-fail2ban
  namespace: kloud-apps
spec:
  plugin:
    fail2ban:
      rules:
        bantime: "3h"
        findtime: "10m"
        maxretry: 4
        enabled: true
        statuscode: "401"
