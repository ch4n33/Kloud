# K3s лӮҙмһҘ Traefikм—җ лҢҖн•ң HelmChartConfig мҳӨлІ„лқјмқҙл“ң
# MetalLB IP кіөмң  м„Өм • (WireGuardмҷҖ 192.168.50.200 кіөмң )
# м Ғмҡ©: kubectl apply -f cluster/core/traefik/helmchartconfig.yaml
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    service:
      annotations:
        metallb.universe.tf/allow-shared-ip: "kloud-shared"
        metallb.universe.tf/loadBalancerIPs: "192.168.50.200"
    experimental:
      plugins:
        fail2ban:
          moduleName: github.com/tomMoulard/fail2ban
          version: v0.8.3
