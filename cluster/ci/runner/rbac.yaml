---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-runner
  namespace: kloud-ci
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: github-runner-deploy
rules:
  - apiGroups: ["", "apps"]
    resources: ["deployments", "services", "configmaps", "secrets", "pods", "persistentvolumeclaims", "namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-runner-deploy
subjects:
  - kind: ServiceAccount
    name: github-runner
    namespace: kloud-ci
roleRef:
  kind: ClusterRole
  name: github-runner-deploy
  apiGroup: rbac.authorization.k8s.io
