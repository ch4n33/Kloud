# kube-prometheus-stack 설치:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f values.yaml
---
# === Prometheus ===
prometheus:
  prometheusSpec:
    # Ryzen에만 배치
    nodeSelector:
      kloud/tier: heavy
    # 리소스 제한
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 2Gi
    # 데이터 보존 기간
    retention: 15d
    # NFS 스토리지 사용 (선택)
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-kloud
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

# === Grafana ===
grafana:
  nodeSelector:
    kloud/tier: heavy
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  # 관리자 비밀번호 (설치 후 변경 권장)
  adminPassword: "kloud-admin"
  # Ingress로 접근 (Traefik)
  ingress:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
    hosts:
      - grafana.kloud.local  # LAN DNS에 등록하거나 /etc/hosts에 추가

# === Alertmanager ===
alertmanager:
  alertmanagerSpec:
    nodeSelector:
      kloud/tier: heavy
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi

# === Node Exporter (모든 노드에서 실행) ===
nodeExporter:
  enabled: true
  # DaemonSet이므로 모든 노드에 배포됨
  # Pi에서도 가벼움 (~15MB RAM)

# === kube-state-metrics ===
kubeStateMetrics:
  nodeSelector:
    kloud/tier: heavy

# === Prometheus Operator ===
prometheusOperator:
  nodeSelector:
    kloud/tier: heavy
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
