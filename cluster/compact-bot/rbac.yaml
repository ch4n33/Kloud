apiVersion: v1
kind: ServiceAccount
metadata:
  name: compact-bot-sa
  namespace: compact-bot
---
# 클러스터 전체 read (kube-system 포함, 디버깅용)
# 빌트인 view ClusterRole — Secret은 포함하지 않음
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: compact-bot-view
subjects:
  - kind: ServiceAccount
    name: compact-bot-sa
    namespace: compact-bot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
---
# 클러스터 전체 edit (RBAC, CRD, webhook, namespaces 자체 제외)
# 빌트인 edit ClusterRole에는 namespaces verb 자체가 없으므로 ns 생성/삭제 불가
# (VAP가 belt-and-suspenders로 추가 차단)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: compact-bot-edit
subjects:
  - kind: ServiceAccount
    name: compact-bot-sa
    namespace: compact-bot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
