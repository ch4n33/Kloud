# compact-bot 영속 스토리지: 3개 PV/PVC 쌍
# 모두 ch4n33-server (Ryzen) hostPath 정적 프로비저닝

# === state PV (3Gi) ===
# subPath로 분기: claude (인증), data (봇 설정), local (~/.local 사용자 패키지)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: compact-bot-state-pv
spec:
  capacity:
    storage: 3Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /home/ch4n33/server-data/compact-bot/state
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: ["ch4n33-server"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: compact-bot-state-pvc
  namespace: compact-bot
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: compact-bot-state-pv
  resources:
    requests:
      storage: 3Gi
---
