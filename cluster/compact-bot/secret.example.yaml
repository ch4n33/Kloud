# 실제 secret.yaml은 .gitignore (**/secret.yaml)
# 사용법:
#   cp secret.example.yaml secret.yaml
#   # 토큰/채널 ID 입력
#   kubectl apply -f secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: compact-bot-secret
  namespace: compact-bot
type: Opaque
stringData:
  # Discord Developer Portal에서 봇 생성 후 복사
  # Message Content Intent 활성화 필수
  DISCORD_BOT_TOKEN: "PASTE_DISCORD_BOT_TOKEN_HERE"

  # 봇이 응답할 채널 ID 콤마 구분 (필수, 누락 시 부팅 실패)
  # Discord 클라이언트에서 채널 우클릭 → ID 복사 (개발자 모드 활성화)
  ALLOWED_CHANNEL_IDS: "1234567890,9876543210"
