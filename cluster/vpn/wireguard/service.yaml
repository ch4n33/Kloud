# WireGuard UDP вЂ” MetalLB LoadBalancer (Traefikкіј 192.168.50.200 IP кіµмњ )
apiVersion: v1
kind: Service
metadata:
  name: wg-easy
  namespace: kloud-vpn
  annotations:
    metallb.universe.tf/allow-shared-ip: "kloud-shared"
    metallb.universe.tf/loadBalancerIPs: "192.168.50.200"
spec:
  type: LoadBalancer
  selector:
    app: wg-easy
  ports:
    - name: wireguard
      port: 51820
      targetPort: 51820
      protocol: UDP
---
# м›№ UI вЂ” ClusterIP (Ingress кІЅмњ  м ‘к·ј)
apiVersion: v1
kind: Service
metadata:
  name: wg-easy-ui
  namespace: kloud-vpn
spec:
  type: ClusterIP
  selector:
    app: wg-easy
  ports:
    - name: web-ui
      port: 51821
      targetPort: 51821
      protocol: TCP
