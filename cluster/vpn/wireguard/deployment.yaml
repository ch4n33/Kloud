# wg-easy: WireGuard VPN + 웹 관리 UI
# hostNetwork 사용 — UDP 51820을 Ryzen 노드 IP에 직접 바인딩
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-easy
  namespace: kloud-vpn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wg-easy
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: wg-easy
    spec:
      nodeSelector:
        kubernetes.io/hostname: ch4n33-server
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: wg-easy
          image: ghcr.io/wg-easy/wg-easy:latest
          ports:
            - containerPort: 51820
              protocol: UDP
            - containerPort: 51821
              protocol: TCP
          env:
            # 외부에서 접속할 주소 (DDNS 도메인)
            - name: WG_HOST
              value: "TODO_DDNS_DOMAIN"
            # VPN 클라이언트가 접근할 서브넷 (홈 LAN)
            - name: WG_ALLOWED_IPS
              value: "192.168.50.0/24"
            # VPN 클라이언트 DNS (공유기)
            - name: WG_DEFAULT_DNS
              value: "192.168.50.1"
            # WireGuard 클라이언트 IP 대역
            - name: WG_DEFAULT_ADDRESS
              value: "10.8.0.x"
            # 웹 UI 비밀번호
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wg-easy-secret
                  key: PASSWORD
          volumeMounts:
            - name: wg-data
              mountPath: /etc/wireguard
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
                - NET_RAW
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
      volumes:
        - name: wg-data
          persistentVolumeClaim:
            claimName: wireguard-pvc
