name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/sample-app/**'
      - 'cluster/apps/sample-app/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ch4n33/sample-app

jobs:
  build-and-deploy:
    runs-on: [self-hosted, kloud]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: apps/sample-app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to K3s
        run: |
          # 매니페스트가 없으면 먼저 생성
          kubectl get deployment sample-app -n kloud-apps 2>/dev/null || \
            kubectl apply -f cluster/apps/sample-app/

          # 이미지 업데이트
          kubectl set image deployment/sample-app \
            sample-app=ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n kloud-apps

          kubectl rollout status deployment/sample-app -n kloud-apps --timeout=120s
